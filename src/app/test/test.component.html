<div class="road-container">
  <div class="controls">
    <label for="curve-select">Curve:</label>
    <select id="curve-select" [(ngModel)]="selectedCurve" (change)="updatePath()">
      <option *ngFor="let curve of curves" [value]="curve.id">{{ curve.label }}</option>
    </select>
    <button type="button" (click)="updatePath()">Update Road</button>
  </div>
  <div class="container" #roadContainer>
    <svg #roadSvg width="100%" height="100%" aria-hidden="true">
      <path class="road-path" #roadPath />
      <path class="lane-separator" #roadLane />
    </svg>
    <svg
      class="car"
      width="60"
      height="30"
      style="width: 60px !important; height: 30px !important;"
      viewBox="0 0 60 30"
      aria-hidden="true"
    >
      <rect x="7.5" y="7.5" width="45" height="22.5" rx="3" fill="#1E90FF" />
      <circle cx="15" cy="27" r="4.5" fill="black" />
      <circle cx="45" cy="27" r="4.5" fill="black" />
      <rect x="22.5" y="10.5" width="15" height="7.5" fill="#87CEEB" />
      <rect x="30" y="10.5" width="7.5" height="7.5" fill="#87CEEB" />
    </svg>
  </div>
</div>
