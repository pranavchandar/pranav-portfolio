<header>
  <button
    type="button"
    class="menu-icon"
    [ngClass]="{ open: isMenuOpen }"
    (click)="toggleMenu()"
    [attr.aria-expanded]="isMenuOpen"
    aria-controls="primary-nav"
    aria-label="Toggle navigation menu"
  >
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <div class="logo-container">
    <img
      src="assets/images/logo.jpg"
      alt="Pranav Chandar logo"
      class="logo"
      (click)="navigateToEasterEgg()"
    />
  </div>

  <nav id="primary-nav" [ngClass]="{ open: isMenuOpen }" aria-label="Primary">
    <ul>
      <li>
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
           (click)="isMenuOpen = false; closeAllSubmenus()">HOME</a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="active"
           (click)="isMenuOpen = false; closeAllSubmenus()">ABOUT</a>
      </li>
      <li>
        <a routerLink="/resume" routerLinkActive="active"
           (click)="isMenuOpen = false; closeAllSubmenus()">RESUME</a>
      </li>

      <li class="mobile-portfolio-item">
        <div
          class="mobile-menu-trigger"
          role="button"
          tabindex="0"
          [attr.aria-expanded]="isSubmenuOpenByIndex(0)"
          aria-controls="mobile-portfolio-submenu"
          (click)="toggleSubmenu(0, $event)"
          (keydown.enter)="toggleSubmenu(0, $event)"
          (keydown.space)="toggleSubmenu(0, $event)"
        >
          <span class="mobile-menu-trigger__label">PORTFOLIO</span>
          <span class="plus-icon" [ngClass]="{ open: isSubmenuOpenByIndex(0) }" aria-hidden="true"></span>
        </div>
        <ul id="mobile-portfolio-submenu" class="mobile-submenu" [ngClass]="{ open: isSubmenuOpenByIndex(0) }">
          <li><a routerLink="/work/programming" routerLinkActive="active"
                 (click)="isMenuOpen = false; closeAllSubmenus()">PROGRAMMING</a></li>
          <li><a routerLink="/work/digital-art" routerLinkActive="active"
                 (click)="isMenuOpen = false; closeAllSubmenus()">DIGITAL ART</a></li>
          <li><a routerLink="/work/cgi" routerLinkActive="active"
                 (click)="isMenuOpen = false; closeAllSubmenus()">CGI</a></li>
        </ul>
      </li>

      <li class="desktop-portfolio-dropdown">
        <div
          class="portfolio-dropdown"
          [class.open]="isSubmenuOpenByIndex(0)"
          role="button"
          tabindex="0"
          [attr.aria-expanded]="isSubmenuOpenByIndex(0)"
          aria-haspopup="true"
          aria-controls="desktop-portfolio-submenu"
          (click)="toggleSubmenu(0, $event)"
          (keydown.enter)="toggleSubmenu(0, $event)"
          (keydown.space)="toggleSubmenu(0, $event)"
        >
          <span class="portfolio-dropdown__label">
            PORTFOLIO
            <span class="dropdown-arrow" [class.open]="isSubmenuOpenByIndex(0)" aria-hidden="true">▼</span>
          </span>
          <ul id="desktop-portfolio-submenu" class="dropdown-menu" [class.open]="isSubmenuOpenByIndex(0)">
            <li><a routerLink="/work/programming" routerLinkActive="active">PROGRAMMING</a></li>
            <li><a routerLink="/work/digital-art" routerLinkActive="active">DIGITAL ART</a></li>
            <li><a routerLink="/work/cgi" routerLinkActive="active">CGI</a></li>
          </ul>
        </div>
      </li>
    </ul>
  </nav>
</header>
