<div class="resume" #resumeContainer>
  <div class="resume__background"></div>
  <div class="resume__overlay"></div>

  <app-navigation (logoClick)="handleLogoClick()"></app-navigation>

  <main class="resume__content-section">
    <div class="resume__inner">
      <header class="resume__header">
        <p class="resume__eyebrow">/ resume</p>
        <h1 class="resume__heading">Resume</h1>
        <p class="resume__summary">{{ summary }}</p>
      </header>

      <section class="resume__section" aria-labelledby="experience-heading">
        <h2 id="experience-heading" class="resume__section-heading">Experience</h2>
        <ol class="resume__timeline">
          <li class="resume__job" *ngFor="let job of experience">
            <div class="resume__job-meta">
              <span class="resume__job-period">{{ job.period }}</span>
            </div>
            <div class="resume__job-body">
              <h3 class="resume__job-role">{{ job.role }}</h3>
              <p class="resume__job-company">{{ job.company }}</p>
              <ul class="resume__job-bullets">
                <li *ngFor="let bullet of job.bullets">{{ bullet }}</li>
              </ul>
            </div>
          </li>
        </ol>
      </section>

      <section class="resume__section" aria-labelledby="skills-heading">
        <h2 id="skills-heading" class="resume__section-heading">Skills</h2>
        <div class="resume__skills">
          <div class="resume__skill-group" *ngFor="let group of skills">
            <h3 class="resume__skill-title">{{ group.title }}</h3>
            <ul class="resume__skill-list">
              <li *ngFor="let item of group.items">{{ item }}</li>
            </ul>
          </div>
        </div>
      </section>

      <section class="resume__section" aria-labelledby="education-heading">
        <h2 id="education-heading" class="resume__section-heading">Education</h2>
        <ul class="resume__education">
          <li *ngFor="let edu of education">
            <p class="resume__edu-degree">{{ edu.degree }}</p>
            <p class="resume__edu-school">{{ edu.school }} · {{ edu.period }}</p>
          </li>
        </ul>
      </section>
    </div>
  </main>

  <app-footer></app-footer>
</div>
