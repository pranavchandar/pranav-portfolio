<div class="container">
  <img
    *ngIf="!videoStarted"
    src="assets/images/intro-placeholder2.webp"
    class="background"
    alt=""
    aria-hidden="true"
  />

  <video
    *ngIf="videoStarted"
    #introVideo
    class="hidden-video"
    autoplay
    muted
    playsinline
    preload="auto"
  >
    <source src="assets/videos/intro3.mp4" type="video/mp4" />
  </video>

  <div class="text-overlay" [class.dissolving]="textDissolving" role="status" aria-live="polite">
    <p class="typewriter">
      {{ displayText }}<span *ngIf="showCursor" class="cursor" aria-hidden="true">|</span>
    </p>
    <input
      *ngIf="promptReady && !userInteractionCompleted"
      #promptInput
      class="prompt-input"
      type="text"
      maxlength="1"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
      (input)="onPromptInput($event)"
      aria-label="Enter Y or N"
    />
  </div>
</div>
