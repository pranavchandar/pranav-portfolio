<div class="container">
  <img
    *ngIf="!videoStarted"
    src="assets/images/intro-placeholder2.png"
    class="background"
    alt=""
    aria-hidden="true"
  />

  <video
    *ngIf="videoStarted"
    #introVideo
    class="hidden-video"
    autoplay
    muted
    playsinline
    preload="auto"
  >
    <source src="assets/videos/intro3.mp4" type="video/mp4" />
  </video>

  <div class="text-overlay" role="status" aria-live="polite">
    <p class="typewriter">
      {{ displayText }}<span *ngIf="showCursor" class="cursor" aria-hidden="true">|</span>
    </p>
  </div>
</div>
