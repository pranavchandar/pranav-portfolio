name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/portfolio-review-feedback-hoZO8
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Pages base href
        run: npx ng build --base-href=/pranav-portfolio/

      - name: Prepare static output for Pages
        run: |
          OUT=dist/pranav-portfolio/browser
          touch "$OUT/.nojekyll"
          cp "$OUT/index.html" "$OUT/404.html"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pranav-portfolio/browser

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
